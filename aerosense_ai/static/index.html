<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="author" content="Enes Bozkurt" />
  <meta name="copyright" content="Copyright © 2026 Enes Bozkurt. Tüm hakları saklıdır." />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="AeroSense AI — KBU Mekatronik 2026 — enesbozkurt.com.tr" />
  <title>AeroSense AI v2 — Panel</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #010409;
      --card: #161b22;
      --line: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
      --ch1: #58a6ff;
      --ch2: #f85149;
      --ch3: #3fb950;
      --ch4: #d2a8ff;
      --radius: 14px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 14px 88px;
    }
    @media (min-width: 900px) {
      .app { padding-bottom: 24px; }
    }
    header.top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 14px;
    }
    header.top h1 {
      margin: 0;
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      font-weight: 800;
      color: #f0f6fc;
      flex: 1 1 160px;
    }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .live i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      animation: pulse 1.8s ease infinite;
    }
    .live.stale i { background: var(--warn); animation: none; }
    .live.err i { background: var(--bad); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.92); }
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    select.lang {
      background: #21262d;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    select.lang:hover { border-color: var(--accent); }
    .api-url {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }
    .api-url code { color: var(--accent); }
    .tabs-desktop {
      display: none;
      gap: 8px;
      margin-bottom: 12px;
    }
    @media (min-width: 900px) {
      .tabs-desktop { display: flex; }
    }
    .tabs-desktop button {
      flex: 0 1 auto;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #21262d;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    .tabs-desktop button:hover { border-color: var(--accent); }
    .tabs-desktop button.on {
      background: #1f2b3d;
      border-color: var(--accent);
      color: #fff;
    }
    section.panel { display: none; }
    section.panel.on { display: block; }
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .hero .aqi-big {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      margin-bottom: 8px;
    }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .pill {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .hero p.summary { margin: 0; font-size: 14px; line-height: 1.55; color: var(--text); }
    .hero .sum-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .hero .sum-actions button {
      background: #0d1117;
      color: var(--text);
      border: 1px solid var(--accent);
      padding: 6px 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .hero .sum-actions button:hover { border-color: var(--accent_cyan); }
    .grid-sensors {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .sensor-card {
      background: linear-gradient(180deg, #1c2128 0%, #13171c 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      border-left: 4px solid var(--accent);
    }
    .sensor-card[data-ch="sicaklik"] { border-left-color: var(--ch1); }
    .sensor-card[data-ch="mq7"] { border-left-color: var(--ch2); }
    .sensor-card[data-ch="mq135"] { border-left-color: var(--ch3); }
    .sensor-card[data-ch="toz"] { border-left-color: var(--ch4); }
    .sensor-card .name { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    .sensor-card .val { font-size: 22px; font-weight: 800; }
    .sensor-card .unit { font-size: 11px; color: var(--muted); }
    .chart-block {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
    }
    .chart-block h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 700; }
    .chart-block canvas { width: 100%; height: 100px; display: block; }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    @media (min-width: 700px) {
      .charts-grid { grid-template-columns: 1fr 1fr; }
    }
    .ai-card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .health-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .health-table th, .health-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .health-table th { background: #161b22; color: var(--muted); font-weight: 700; }
    .health-table tr:last-child td { border-bottom: none; }
    .st-ok { color: var(--ok); font-weight: 700; }
    .st-warn { color: var(--warn); font-weight: 700; }
    .st-bad { color: var(--bad); font-weight: 700; }
    footer.wm {
      margin-top: 20px;
      padding: 16px 0;
      border-top: 1px solid var(--line);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    footer.wm a { color: var(--accent); }
    nav.bottom {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 8px calc(10px + env(safe-area-inset-bottom, 0));
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      z-index: 50;
    }
    @media (min-width: 900px) {
      nav.bottom { display: none; }
    }
    nav.bottom button {
      flex: 1;
      max-width: 120px;
      padding: 8px 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 10px;
    }
    nav.bottom button.on { color: var(--accent); background: #161b22; }
    .err-banner {
      background: #3d1117;
      border: 1px solid var(--bad);
      color: #f0a0a0;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 13px;
    }
  </style>
  <!-- AeroSense AI — © 2026 Enes Bozkurt | KBU Mekatronik | enesbozkurt.com.tr -->
</head>
<body>
  <div class="app">
    <header class="top">
      <h1 id="appTitle">AeroSense AI</h1>
      <span class="live" id="liveDot"><i></i><span id="liveText">—</span></span>
      <div class="toolbar">
        <select class="lang" id="langSel" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="api-url" id="apiLine"></div>
    </header>

    <div class="tabs-desktop" id="tabsDesk"></div>
    <div id="errBox" class="err-banner" style="display:none"></div>

    <section class="panel on" data-panel="0">
      <div class="hero" id="heroBox">
        <div class="pills" id="pills"></div>
        <div class="aqi-big" id="aqiBig">—</div>
        <p class="summary" id="aiSummary">…</p>
        <div class="sum-actions">
          <button id="btnAiSummaryToday" type="button">Özet: Bugün</button>
          <button id="btnAiSummaryUptime" type="button">Özet: Bu ana kadar</button>
        </div>
      </div>
      <div class="grid-sensors" id="sensorGrid"></div>
      <div class="chart-block">
        <h3 id="trendTitle">Trend</h3>
        <canvas id="chartAll" height="140"></canvas>
      </div>
    </section>

    <section class="panel" data-panel="1">
      <div class="charts-grid" id="perCharts"></div>
    </section>

    <section class="panel" data-panel="2">
      <div class="ai-card" id="aiDetail">…</div>
    </section>

    <section class="panel" data-panel="3">
      <table class="health-table">
        <thead><tr id="healthHead"></tr></thead>
        <tbody id="healthBody"></tbody>
      </table>
    </section>

    <footer class="wm">
      <strong>© 2026 Enes Bozkurt</strong> — <span id="footUni"></span><br />
      <a href="https://enesbozkurt.com.tr" rel="noopener">enesbozkurt.com.tr</a> — <span id="footRights"></span>
    </footer>
  </div>

  <nav class="bottom" id="bottomNav"></nav>

  <script>
(function () {
  const CHANNELS_DEFAULT = ['sicaklik', 'mq7', 'mq135', 'toz'];
  const COLORS = { sicaklik: '#58a6ff', mq7: '#f85149', mq135: '#3fb950', toz: '#d2a8ff' };
  const LABELS = {
    tr: {
      title: 'AeroSense AI v2',
      live: 'Canlı',
      stale: 'Veri gecikti',
      err: 'Bağlantı hatası',
      tab0: 'Özet',
      tab1: 'Sensörler',
      tab2: 'AI',
      tab3: 'Sağlık',
      trend: 'Zaman serisi — tüm kanallar',
      conf: 'Güven',
      anomaly: 'Anomali',
      footUni: 'Karabük Üniversitesi (KBU), Mekatronik Mühendisliği, 2026.',
      footRights: 'Tüm hakları saklıdır. İzinsiz ticari kullanım yasaktır.',
      thCh: 'Kanal', thSt: 'Durum', thMsg: 'Açıklama',
      names: {
        sicaklik: 'Sıcaklık', mq7: 'MQ-7', mq135: 'MQ-135', toz: 'Toz / PM'
      }
    },
    en: {
      title: 'AeroSense AI v2',
      live: 'Live',
      stale: 'Data stale',
      err: 'Connection error',
      tab0: 'Overview',
      tab1: 'Sensors',
      tab2: 'AI',
      tab3: 'Health',
      trend: 'Time series — all channels',
      conf: 'Confidence',
      anomaly: 'Anomaly',
      footUni: 'Karabük University, Mechatronics Engineering, 2026.',
      footRights: 'All rights reserved. No commercial use without permission.',
      thCh: 'Channel', thSt: 'Status', thMsg: 'Detail',
      names: {
        sicaklik: 'Temperature', mq7: 'MQ-7', mq135: 'MQ-135', toz: 'Dust / PM'
      }
    }
  };

  let lang = localStorage.getItem('aerosense_lang') || 'tr';
  if (lang !== 'tr' && lang !== 'en') lang = 'tr';
  let panelIdx = 0;

  function S() { return LABELS[lang]; }

  function setLang(l) {
    lang = l;
    localStorage.setItem('aerosense_lang', lang);
    document.documentElement.lang = lang;
    document.getElementById('langSel').value = lang;
    buildTabs();
    renderHealthHead();
    const o = window.location.origin;
    document.getElementById('apiLine').innerHTML =
      lang === 'en'
        ? `REST · <code>${o}</code> · same as desktop app`
        : `REST · <code>${o}</code> · masaüstü uygulaması ile aynı`;
  }

  function buildTabs() {
    const L = S();
    const desk = document.getElementById('tabsDesk');
    const bot = document.getElementById('bottomNav');
    const tabs = [L.tab0, L.tab1, L.tab2, L.tab3];
    desk.innerHTML = '';
    bot.innerHTML = '';
    tabs.forEach((label, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = label;
      b.className = i === panelIdx ? 'on' : '';
      b.dataset.tab = i;
      b.addEventListener('click', () => showPanel(i));
      desk.appendChild(b);
      const b2 = document.createElement('button');
      b2.type = 'button';
      b2.textContent = label;
      b2.className = i === panelIdx ? 'on' : '';
      b2.dataset.tab = i;
      b2.addEventListener('click', () => showPanel(i));
      bot.appendChild(b2);
    });
    document.getElementById('appTitle').textContent = L.title;
    document.getElementById('trendTitle').textContent = L.trend;
    document.getElementById('footUni').textContent = L.footUni;
    document.getElementById('footRights').textContent = L.footRights;
    showPanel(panelIdx);
  }

  function showPanel(i) {
    panelIdx = i;
    document.querySelectorAll('section.panel').forEach((el, j) => {
      el.classList.toggle('on', j === i);
    });
    document.querySelectorAll('.tabs-desktop button, nav.bottom button').forEach((b) => {
      b.classList.toggle('on', Number(b.dataset.tab) === i);
    });
  }

  function renderHealthHead() {
    const L = S();
    const tr = document.getElementById('healthHead');
    tr.innerHTML = `<th>${L.thCh}</th><th>${L.thSt}</th><th>${L.thMsg}</th>`;
  }

  document.getElementById('langSel').addEventListener('change', (e) => setLang(e.target.value));

  function drawLineCanvas(canvas, seriesList) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    const h = canvas.height = (canvas.clientHeight || 100) * (window.devicePixelRatio || 1);
    ctx.scale(1, 1);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);
    if (!seriesList.length) return;
    let ymin = Infinity, ymax = -Infinity;
    seriesList.forEach(({ ys }) => {
      ys.forEach((y) => {
        if (y != null && !isNaN(y)) { ymin = Math.min(ymin, y); ymax = Math.max(ymax, y); }
      });
    });
    if (!isFinite(ymin)) return;
    const pad = (ymax - ymin) * 0.08 || 0.1;
    ymin -= pad; ymax += pad;
    const x0 = 4, x1 = w - 4, y0 = h - 6, y1 = 6;
    seriesList.forEach(({ ys, color }) => {
      if (!ys || ys.length < 2) return;
      let started = false;
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2 * (window.devicePixelRatio || 1);
      ys.forEach((y, i) => {
        if (y == null || isNaN(y)) { started = false; return; }
        const t = ys.length > 1 ? i / (ys.length - 1) : 0;
        const px = x0 + t * (x1 - x0);
        const py = y0 - ((y - ymin) / (ymax - ymin || 1)) * (y0 - y1);
        if (!started) { ctx.moveTo(px, py); started = true; }
        else ctx.lineTo(px, py);
      });
      ctx.stroke();
    });
  }

  function buildPerCharts(channels) {
    const host = document.getElementById('perCharts');
    host.innerHTML = '';
    const L = S();
    channels.forEach((ch) => {
      const blk = document.createElement('div');
      blk.className = 'chart-block';
      const h = document.createElement('h3');
      h.textContent = (L.names[ch] || ch);
      const cv = document.createElement('canvas');
      cv.height = 100;
      cv.dataset.ch = ch;
      blk.appendChild(h);
      blk.appendChild(cv);
      host.appendChild(blk);
    });
  }

  let builtChKey = '';

  async function fetchJson(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.statusText);
    return r.json();
  }

  async function tick() {
    const errBox = document.getElementById('errBox');
    const L = S();
    try {
      const API_ROOT = window.location.origin;
      const [latest, hist] = await Promise.all([
        fetchJson(API_ROOT + '/api/sensors/latest'),
        fetchJson(API_ROOT + '/api/history?n=120')
      ]);
      errBox.style.display = 'none';

      const a = latest.ai_analysis || {};
      const sensors = latest.sensors || {};
      const ch = (latest.channels && latest.channels.length) ? latest.channels : CHANNELS_DEFAULT;

      const staleSec = 15;
      const ts = latest.timestamp_unix || 0;
      const now = Date.now() / 1000;
      const live = document.getElementById('liveDot');
      const liveText = document.getElementById('liveText');
      if (!ts || (now - ts) > staleSec) {
        live.className = 'live stale';
        liveText.textContent = L.stale;
      } else {
        live.className = 'live';
        liveText.textContent = L.live;
      }

      const hex = a.color_hex || '58a6ff';
      document.getElementById('aqiBig').style.color = '#' + hex;
      document.getElementById('aqiBig').textContent = a.aqi_level || '—';

      const pills = document.getElementById('pills');
      pills.innerHTML = '';
      const p1 = document.createElement('span');
      p1.className = 'pill';
      p1.style.background = '#' + hex;
      p1.style.color = '#0d1117';
      p1.textContent = (a.aqi_level || 'AQI');
      pills.appendChild(p1);
      const p2 = document.createElement('span');
      p2.className = 'pill';
      p2.style.background = '#21262d';
      p2.textContent = L.conf + ' %' + (a.confidence != null ? a.confidence : '—');
      pills.appendChild(p2);
      if (a.is_anomaly) {
        const p3 = document.createElement('span');
        p3.className = 'pill';
        p3.style.background = '#f85149';
        p3.textContent = L.anomaly;
        pills.appendChild(p3);
      }

      document.getElementById('aiSummary').textContent =
        latest.ai_tr || (lang === 'en' ? 'No summary yet.' : 'Özet yok.');
      const adv = a.advice != null ? String(a.advice) : '';
      document.getElementById('aiDetail').textContent =
        [latest.ai_tr, latest.ai_detail_tr, adv].filter(Boolean).join('\n\n') || '—';

      const grid = document.getElementById('sensorGrid');
      grid.innerHTML = '';
      ch.forEach((key) => {
        const v = sensors[key];
        const card = document.createElement('div');
        card.className = 'sensor-card';
        card.dataset.ch = key;
        card.innerHTML =
          '<div class="name">' + (L.names[key] || key) + '</div>' +
          '<div class="val">' + (v != null ? Number(v).toPrecision(4) : '—') + '</div>' +
          '<div class="unit">' + key + '</div>';
        grid.appendChild(card);
      });

      const items = (hist.items || []).slice(-120);
      const cvAll = document.getElementById('chartAll');
      const aligned = ch.map((key) => ({
        ys: items.map((it) => (it.sensors && it.sensors[key] != null) ? Number(it.sensors[key]) : null),
        color: COLORS[key] || '#79c0ff'
      }));
      drawLineCanvas(cvAll, aligned);

      const chKey = ch.join(',');
      if (chKey !== builtChKey) {
        buildPerCharts(ch);
        builtChKey = chKey;
      }
      ch.forEach((key) => {
        const cv = document.querySelector('#perCharts canvas[data-ch="' + key + '"]');
        if (cv) {
          const ys = items.map((it) => (it.sensors && it.sensors[key] != null) ? Number(it.sensors[key]) : null);
          drawLineCanvas(cv, [{ ys, color: COLORS[key] || '#58a6ff' }]);
        }
      });

      const tbody = document.getElementById('healthBody');
      tbody.innerHTML = '';
      (latest.sensor_health || []).forEach((row) => {
        const tr = document.createElement('tr');
        const st = row.status || '';
        const cls = st === 'ok' ? 'st-ok' : (st === 'uyari' ? 'st-warn' : 'st-bad');
        tr.innerHTML =
          '<td>' + row.channel + '</td>' +
          '<td class="' + cls + '">' + st + '</td>' +
          '<td>' + (row.message_tr || '') + '</td>';
        tbody.appendChild(tr);
      });
    } catch (e) {
      errBox.style.display = 'block';
      errBox.textContent = (L.err || 'Error') + ': ' + e.message;
      document.getElementById('liveDot').className = 'live err';
    }
  }

  async function fetchAiSummary(mode) {
    const errBox = document.getElementById('errBox');
    try {
      errBox.style.display = 'none';
      const API_ROOT = window.location.origin;
      const r = await fetch(API_ROOT + '/api/ai/summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, lang })
      });
      if (!r.ok) throw new Error(r.statusText);
      const d = await r.json();
      if (d.api_error) throw new Error(d.api_error);
      document.getElementById('aiSummary').textContent =
        d.summary_tr || (lang === 'en' ? 'No summary yet.' : 'Özet yok.');
      document.getElementById('aiDetail').textContent =
        d.detail_tr || d.summary_tr || '—';
    } catch (e) {
      errBox.style.display = 'block';
      errBox.textContent = 'Summary error: ' + e.message;
      document.getElementById('liveDot').className = 'live err';
    }
  }

  const btnToday = document.getElementById('btnAiSummaryToday');
  if (btnToday) btnToday.addEventListener('click', () => fetchAiSummary('today'));
  const btnUptime = document.getElementById('btnAiSummaryUptime');
  if (btnUptime) btnUptime.addEventListener('click', () => fetchAiSummary('uptime'));

  setLang(lang);

  tick();
  setInterval(tick, 2000);
})();
  </script>
</body>
</html>
